name: Generate AI Robot Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: SVG Scriptini Çalıştır
        run: python generate_animation.py

      - name: Yeni Animasyonu Repoya Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add robot-animasyon.svg
          git commit -m "🤖 Robot animasyonu güncellendi" || exit 0
          git push
